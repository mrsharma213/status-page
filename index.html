<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Jet Damon — Operational Status</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, 'SF Pro', 'Segoe UI', sans-serif; background: #0a0a0a; color: #e0e0e0; min-height: 100vh; }
  
  /* Lock screen */
  #lock-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; }
  #lock-screen .bolt { font-size: 48px; margin-bottom: 24px; }
  #lock-screen h2 { font-size: 18px; color: #888; font-weight: 400; margin-bottom: 32px; }
  .pin-input { display: flex; gap: 12px; margin-bottom: 24px; }
  .pin-input input { width: 52px; height: 60px; background: #141414; border: 1px solid #333; border-radius: 10px; color: #fff; font-size: 24px; text-align: center; outline: none; -webkit-text-security: disc; }
  .pin-input input:focus { border-color: #fbbf24; box-shadow: 0 0 0 2px rgba(251, 191, 36, 0.2); }
  .pin-error { color: #ef4444; font-size: 13px; height: 20px; }
  #main-content { display: none; }
  .container { max-width: 720px; margin: 0 auto; padding: 32px 20px; }
  header { margin-bottom: 40px; }
  header h1 { font-size: 24px; font-weight: 600; color: #fff; display: flex; align-items: center; gap: 10px; }
  header h1 .bolt { color: #fbbf24; }
  .overall-status { padding: 20px 24px; border-radius: 12px; margin-bottom: 32px; display: flex; align-items: center; gap: 12px; }
  .overall-status.operational { background: rgba(34, 197, 94, 0.1); border: 1px solid rgba(34, 197, 94, 0.2); }
  .overall-status.degraded { background: rgba(251, 191, 36, 0.1); border: 1px solid rgba(251, 191, 36, 0.2); }
  .overall-status.down { background: rgba(239, 68, 68, 0.1); border: 1px solid rgba(239, 68, 68, 0.2); }
  .overall-status .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .overall-status.operational .dot { background: #22c55e; box-shadow: 0 0 8px rgba(34, 197, 94, 0.5); }
  .overall-status.degraded .dot { background: #fbbf24; box-shadow: 0 0 8px rgba(251, 191, 36, 0.5); }
  .overall-status.down .dot { background: #ef4444; box-shadow: 0 0 8px rgba(239, 68, 68, 0.5); }
  .overall-status .text { font-size: 16px; font-weight: 500; }
  .overall-status.operational .text { color: #22c55e; }
  .overall-status.degraded .text { color: #fbbf24; }
  .overall-status.down .text { color: #ef4444; }

  .section { margin-bottom: 32px; }
  .section h2 { font-size: 14px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; color: #888; margin-bottom: 12px; }
  .component-list { background: #141414; border: 1px solid #222; border-radius: 12px; overflow: hidden; }
  .component { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid #1a1a1a; }
  .component:last-child { border-bottom: none; }
  .component .name { display: flex; align-items: center; gap: 8px; font-size: 14px; }
  .component .name .emoji { font-size: 16px; }
  .component .status-badge { font-size: 12px; font-weight: 500; padding: 4px 10px; border-radius: 6px; }
  .badge-operational { background: rgba(34, 197, 94, 0.15); color: #22c55e; }
  .badge-degraded { background: rgba(251, 191, 36, 0.15); color: #fbbf24; }
  .badge-down { background: rgba(239, 68, 68, 0.15); color: #ef4444; }
  .badge-unknown { background: rgba(128, 128, 128, 0.15); color: #888; }

  .incidents { background: #141414; border: 1px solid #222; border-radius: 12px; overflow: hidden; }
  .incident { padding: 16px 20px; border-bottom: 1px solid #1a1a1a; }
  .incident:last-child { border-bottom: none; }
  .incident .date { font-size: 12px; color: #666; margin-bottom: 4px; }
  .incident .title { font-size: 14px; font-weight: 500; margin-bottom: 4px; }
  .incident .desc { font-size: 13px; color: #999; line-height: 1.5; }
  .incident .resolved { color: #22c55e; font-size: 12px; margin-top: 6px; }

  .footer { margin-top: 48px; text-align: center; font-size: 12px; color: #444; }
  .footer .updated { margin-bottom: 4px; }
  .no-incidents { padding: 24px; text-align: center; color: #666; font-size: 14px; }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  .loading { animation: pulse 1.5s ease-in-out infinite; }
</style>
</head>
<body>
<div id="lock-screen">
  <div class="bolt">⚡</div>
  <h2>Enter passcode</h2>
  <div class="pin-input">
    <input type="tel" maxlength="1" autofocus>
    <input type="tel" maxlength="1">
    <input type="tel" maxlength="1">
    <input type="tel" maxlength="1">
  </div>
  <div class="pin-error" id="pin-error"></div>
</div>

<div id="main-content" class="container">
  <header>
    <h1><span class="bolt">⚡</span> Jet Damon — Status</h1>
  </header>

  <div id="overall" class="overall-status operational">
    <div class="dot"></div>
    <div class="text loading">Loading...</div>
  </div>

  <div class="section">
    <h2>Infrastructure</h2>
    <div id="infra" class="component-list">
      <div class="component"><span class="name">Loading...</span></div>
    </div>
  </div>

  <div class="section">
    <h2>Bot Fleet</h2>
    <div id="bots" class="component-list">
      <div class="component"><span class="name">Loading...</span></div>
    </div>
  </div>

  <div class="section">
    <h2>Integrations</h2>
    <div id="integrations" class="component-list">
      <div class="component"><span class="name">Loading...</span></div>
    </div>
  </div>

  <div class="section">
    <h2>Recent Incidents</h2>
    <div id="incidents" class="incidents">
      <div class="no-incidents">Loading...</div>
    </div>
  </div>

  <div class="footer">
    <div class="updated" id="last-updated">Last updated: —</div>
    <div>Powered by OpenClaw</div>
  </div>
</div>

<script>
// Passcode gate
const HASH = '7586';
const inputs = document.querySelectorAll('.pin-input input');
const lockScreen = document.getElementById('lock-screen');
const mainContent = document.getElementById('main-content');

// Check if already authed this session
if (sessionStorage.getItem('jet-auth') === 'true') {
  lockScreen.style.display = 'none';
  mainContent.style.display = 'block';
  loadStatus();
}

inputs.forEach((input, i) => {
  input.addEventListener('input', (e) => {
    if (e.target.value.length === 1 && i < inputs.length - 1) {
      inputs[i + 1].focus();
    }
    if (i === inputs.length - 1 && e.target.value.length === 1) {
      const code = Array.from(inputs).map(inp => inp.value).join('');
      if (code === HASH) {
        sessionStorage.setItem('jet-auth', 'true');
        lockScreen.style.display = 'none';
        mainContent.style.display = 'block';
        loadStatus();
      } else {
        document.getElementById('pin-error').textContent = 'Wrong code';
        inputs.forEach(inp => { inp.value = ''; inp.style.borderColor = '#ef4444'; });
        inputs[0].focus();
        setTimeout(() => {
          inputs.forEach(inp => inp.style.borderColor = '#333');
          document.getElementById('pin-error').textContent = '';
        }, 1500);
      }
    }
  });
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Backspace' && !e.target.value && i > 0) {
      inputs[i - 1].focus();
    }
  });
});
</script>

<script>
async function loadStatus() {
  try {
    const res = await fetch('./status.json?' + Date.now());
    const data = await res.json();
    render(data);
  } catch (e) {
    document.getElementById('overall').className = 'overall-status unknown';
    document.querySelector('#overall .text').textContent = 'Unable to load status';
  }
}

function badge(status) {
  const labels = { operational: 'Operational', degraded: 'Degraded', down: 'Down', unknown: 'Unknown' };
  return `<span class="status-badge badge-${status}">${labels[status] || status}</span>`;
}

function render(data) {
  // Overall
  const el = document.getElementById('overall');
  el.className = `overall-status ${data.overall}`;
  const labels = { operational: 'All Systems Operational', degraded: 'Partial Degradation', down: 'Major Outage' };
  el.querySelector('.text').textContent = labels[data.overall] || data.overall;
  el.querySelector('.text').classList.remove('loading');

  // Infrastructure
  document.getElementById('infra').innerHTML = data.infrastructure.map(c =>
    `<div class="component"><span class="name"><span class="emoji">${c.emoji || ''}</span> ${c.name}</span>${badge(c.status)}</div>`
  ).join('');

  // Bots
  document.getElementById('bots').innerHTML = data.bots.map(c =>
    `<div class="component"><span class="name"><span class="emoji">${c.emoji || ''}</span> ${c.name}</span>${badge(c.status)}</div>`
  ).join('');

  // Integrations
  document.getElementById('integrations').innerHTML = data.integrations.map(c =>
    `<div class="component"><span class="name"><span class="emoji">${c.emoji || ''}</span> ${c.name}</span>${badge(c.status)}</div>`
  ).join('');

  // Incidents
  if (data.incidents && data.incidents.length > 0) {
    document.getElementById('incidents').innerHTML = data.incidents.map(i =>
      `<div class="incident">
        <div class="date">${i.date}</div>
        <div class="title">${i.title}</div>
        <div class="desc">${i.description}</div>
        ${i.resolved ? `<div class="resolved">✓ Resolved${i.resolvedAt ? ' — ' + i.resolvedAt : ''}</div>` : ''}
      </div>`
    ).join('');
  } else {
    document.getElementById('incidents').innerHTML = '<div class="no-incidents">No incidents in the last 30 days 🎉</div>';
  }

  // Footer
  document.getElementById('last-updated').textContent = `Last updated: ${data.updatedAt || 'Unknown'}`;
}

loadStatus();
setInterval(loadStatus, 60000);
</script>
</body>
</html>
