<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Status">
<meta name="theme-color" content="#0a0a0a">
<link rel="apple-touch-icon" href="icon-180.png">
<link rel="icon" type="image/png" href="icon-180.png">
<meta property="og:title" content="⚡ System Status">
<meta property="og:description" content="Operational status for all bots, integrations, and infrastructure.">
<meta property="og:image" content="https://identity.nik.co/og-image.png">
<meta property="og:url" content="https://identity.nik.co">
<meta property="og:type" content="website">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="⚡ System Status">
<meta name="twitter:description" content="Operational status for all bots and infrastructure.">
<meta name="twitter:image" content="https://identity.nik.co/og-image.png">
<title>Identity — System Status</title>
<link rel="preconnect" href="https://rsms.me">
<link rel="stylesheet" href="https://rsms.me/inter/inter.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Inter var', 'Inter', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; font-feature-settings: "cv01", "cv05", "cv09", "cv11", "ss03", "ss07"; background: #000000; color: #e0e0e0; min-height: 100vh; -webkit-font-smoothing: antialiased; }
  
  /* Lock screen */
  #lock-screen { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; background: #000; }
  #lock-screen .bolt { font-size: 48px; margin-bottom: 24px; }
  #lock-screen h2 { font-size: 18px; color: #a6a6a6; font-weight: 400; margin-bottom: 32px; letter-spacing: -0.3px; }
  .pin-input { display: flex; gap: 12px; margin-bottom: 24px; }
  .pin-input input { width: 52px; height: 60px; background: #0a0a0a; border: 1px solid rgba(255,255,255,0.08); border-radius: 12px; color: #fff; font-size: 24px; text-align: center; outline: none; -webkit-text-security: disc; }
  .pin-input input:focus { border-color: #fbbf24; box-shadow: 0 0 0 2px rgba(251, 191, 36, 0.15); }
  .pin-error { color: #ef4444; font-size: 13px; height: 20px; }
  #main-content { display: none; }
  .container { max-width: 720px; margin: 0 auto; padding: 32px 20px; }
  header { margin-bottom: 40px; }
  header h1 { font-size: 28px; font-weight: 700; color: #fff; display: flex; align-items: center; gap: 10px; letter-spacing: -1px; }
  header h1 .bolt { color: #fbbf24; }
  .overall-status { padding: 20px 24px; border-radius: 12px; margin-bottom: 32px; display: flex; align-items: center; gap: 12px; }
  .overall-status.operational { background: rgba(34, 197, 94, 0.08); border: 1px solid rgba(34, 197, 94, 0.15); }
  .overall-status.degraded { background: rgba(251, 191, 36, 0.08); border: 1px solid rgba(251, 191, 36, 0.15); }
  .overall-status.down { background: rgba(239, 68, 68, 0.08); border: 1px solid rgba(239, 68, 68, 0.15); }
  .overall-status .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .overall-status.operational .dot { background: #22c55e; box-shadow: 0 0 8px rgba(34, 197, 94, 0.4); }
  .overall-status.degraded .dot { background: #fbbf24; box-shadow: 0 0 8px rgba(251, 191, 36, 0.4); }
  .overall-status.down .dot { background: #ef4444; box-shadow: 0 0 8px rgba(239, 68, 68, 0.4); }
  .overall-status .text { font-size: 16px; font-weight: 500; }
  .overall-status.operational .text { color: #22c55e; }
  .overall-status.degraded .text { color: #fbbf24; }
  .overall-status.down .text { color: #ef4444; }

  .section { margin-bottom: 32px; }
  .section h2 { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px; color: rgba(255,255,255,0.4); margin-bottom: 12px; }
  .component-list { background: #0a0a0a; border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; overflow: hidden; }
  .component { display: flex; align-items: center; justify-content: space-between; padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.03); }
  .component:last-child { border-bottom: none; }
  .component .name { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #fff; }
  .component .name .emoji { font-size: 16px; }
  .component .status-badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 8px; text-transform: uppercase; letter-spacing: 0.3px; }
  .badge-operational { background: rgba(34, 197, 94, 0.12); color: #22c55e; }
  .badge-degraded { background: rgba(251, 191, 36, 0.12); color: #fbbf24; }
  .badge-down { background: rgba(239, 68, 68, 0.12); color: #ef4444; }
  .badge-unknown { background: rgba(255, 255, 255, 0.05); color: rgba(255,255,255,0.4); }

  /* QA Stats */
  .qa-stats { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 12px; }
  .qa-stat { background: #0a0a0a; border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; padding: 16px; text-align: center; }
  .qa-stat .number { font-size: 32px; font-weight: 700; margin-bottom: 4px; letter-spacing: -1px; }
  .qa-stat .label { font-size: 11px; text-transform: uppercase; letter-spacing: 0.5px; color: rgba(255,255,255,0.4); font-weight: 500; }
  .qa-stat.pass .number { color: #22c55e; }
  .qa-stat.fail .number { color: #ef4444; }
  .qa-stat.flagged .number { color: #fbbf24; }
  .qa-review-list { background: #0a0a0a; border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; overflow: hidden; max-height: 320px; overflow-y: auto; }
  .qa-item { display: flex; gap: 12px; padding: 12px 20px; border-bottom: 1px solid rgba(255,255,255,0.03); align-items: flex-start; }
  .qa-item:last-child { border-bottom: none; }
  .qa-badge { font-size: 10px; font-weight: 600; text-transform: uppercase; padding: 2px 8px; border-radius: 6px; white-space: nowrap; letter-spacing: 0.3px; }
  .qa-badge.pass { background: rgba(34, 197, 94, 0.12); color: #22c55e; }
  .qa-badge.fail { background: rgba(239, 68, 68, 0.12); color: #ef4444; }
  .qa-badge.flagged { background: rgba(251, 191, 36, 0.12); color: #fbbf24; }
  .qa-badge.deploy { background: rgba(59, 130, 246, 0.12); color: #60a5fa; }

  /* Activity log */
  .tab-bar { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
  .tab-btn { font-size: 12px; font-weight: 500; padding: 6px 14px; border-radius: 40px; border: 1px solid rgba(255,255,255,0.05); background: rgba(255,255,255,0.05); color: #a6a6a6; cursor: pointer; transition: all 0.15s; white-space: nowrap; font-family: inherit; }
  .tab-btn:hover { border-color: rgba(255,255,255,0.15); color: #fff; }
  .tab-btn.active { background: rgba(251, 191, 36, 0.1); border-color: rgba(251, 191, 36, 0.3); color: #fbbf24; }
  .activity-list { background: #0a0a0a; border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; overflow: hidden; max-height: 480px; overflow-y: auto; }
  .activity-item { display: flex; gap: 12px; padding: 12px 20px; border-bottom: 1px solid rgba(255,255,255,0.03); align-items: flex-start; }
  .activity-item:last-child { border-bottom: none; }
  .activity-time { font-size: 11px; color: rgba(255,255,255,0.3); white-space: nowrap; min-width: 70px; padding-top: 2px; }
  .activity-cat { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; padding: 2px 8px; border-radius: 6px; white-space: nowrap; }
  .cat-fix { background: rgba(139, 92, 246, 0.12); color: #a78bfa; }
  .cat-check { background: rgba(34, 197, 94, 0.12); color: #22c55e; }
  .cat-outbound { background: rgba(59, 130, 246, 0.12); color: #60a5fa; }
  .cat-memory { background: rgba(251, 191, 36, 0.12); color: #fbbf24; }
  .cat-infra { background: rgba(239, 68, 68, 0.12); color: #f87171; }
  .cat-research { background: rgba(45, 212, 191, 0.12); color: #2dd4bf; }
  .cat-docs { background: rgba(156, 163, 175, 0.12); color: #9ca3af; }
  .cat-reminder { background: rgba(251, 146, 60, 0.12); color: #fb923c; }
  .cat-content { background: rgba(236, 72, 153, 0.12); color: #f472b6; }
  .cat-deploy { background: rgba(14, 165, 233, 0.12); color: #38bdf8; }
  .activity-text { font-size: 13px; color: #a6a6a6; line-height: 1.4; }
  .activity-list::-webkit-scrollbar { width: 6px; }
  .activity-list::-webkit-scrollbar-track { background: #0a0a0a; }
  .activity-list::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }

  .incidents { background: #0a0a0a; border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; overflow: hidden; }
  .incident { padding: 16px 20px; border-bottom: 1px solid rgba(255,255,255,0.03); }
  .incident:last-child { border-bottom: none; }
  .incident .date { font-size: 12px; color: rgba(255,255,255,0.3); margin-bottom: 4px; }
  .incident .title { font-size: 14px; font-weight: 500; margin-bottom: 4px; color: #fff; }
  .incident .desc { font-size: 13px; color: #a6a6a6; line-height: 1.5; }
  .incident .resolved { color: #22c55e; font-size: 12px; margin-top: 6px; }

  .footer { margin-top: 48px; text-align: center; font-size: 12px; color: rgba(255,255,255,0.2); }
  .footer .updated { margin-bottom: 4px; }
  .no-incidents { padding: 24px; text-align: center; color: rgba(255,255,255,0.3); font-size: 14px; }

  @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
  .loading { animation: pulse 1.5s ease-in-out infinite; }
</style>
</head>
<body>
<div id="lock-screen">
  <div class="bolt">⚡</div>
  <h2>Enter passcode</h2>
  <div class="pin-input">
    <input type="tel" maxlength="1" autofocus>
    <input type="tel" maxlength="1">
    <input type="tel" maxlength="1">
    <input type="tel" maxlength="1">
  </div>
  <div class="pin-error" id="pin-error"></div>
</div>

<div id="main-content" class="container">
  <header>
    <h1><span class="bolt">🔒</span> Identity — Status</h1>
  </header>

  <div id="overall" class="overall-status operational">
    <div class="dot"></div>
    <div class="text loading">Loading...</div>
  </div>

  <div class="section">
    <h2>Infrastructure</h2>
    <div id="infra" class="component-list">
      <div class="component"><span class="name">Loading...</span></div>
    </div>
  </div>

  <div class="section">
    <h2>Bot Fleet</h2>
    <div id="bots" class="component-list">
      <div class="component"><span class="name">Loading...</span></div>
    </div>
  </div>

  <div class="section">
    <h2>Integrations</h2>
    <div id="integrations" class="component-list">
      <div class="component"><span class="name">Loading...</span></div>
    </div>
  </div>

  <div class="section">
    <h2>QA Verification</h2>
    <div class="qa-stats">
      <div class="qa-stat pass"><div class="number" id="qa-pass">0</div><div class="label">Passed</div></div>
      <div class="qa-stat fail"><div class="number" id="qa-fail">0</div><div class="label">Failed</div></div>
      <div class="qa-stat flagged"><div class="number" id="qa-flagged">0</div><div class="label">Flagged</div></div>
    </div>
    <div id="qa-reviews" class="qa-review-list">
      <div class="no-incidents">Loading...</div>
    </div>
  </div>

  <div class="section">
    <h2>Activity Log</h2>
    <div class="tab-bar" id="bot-tabs">
      <button class="tab-btn active" data-bot="all">All</button>
      <button class="tab-btn" data-bot="jet">⚡ Jet</button>
      <button class="tab-btn" data-bot="crm">📇 CRM</button>
      <button class="tab-btn" data-bot="macra">💊 Macra</button>
      <button class="tab-btn" data-bot="macra-app">📱 Macra App</button>
      <button class="tab-btn" data-bot="printingpress">🖨️ Press</button>
      <button class="tab-btn" data-bot="writer">✍️ Josiah</button>
      <button class="tab-btn" data-bot="gemma">🤓 Chip</button>
      <button class="tab-btn" data-bot="grok">🔍 Grok</button>
      <button class="tab-btn" data-bot="health">💪 Health</button>
    </div>
    <div id="activity" class="activity-list">
      <div class="no-incidents">Loading...</div>
    </div>
  </div>

  <div class="section">
    <h2>Recent Incidents</h2>
    <div id="incidents" class="incidents">
      <div class="no-incidents">Loading...</div>
    </div>
  </div>

  <div class="footer">
    <div class="updated" id="last-updated">Last updated: —</div>
    <div>Powered by OpenClaw</div>
  </div>
</div>

<script>
// Passcode gate
const HASH = '7586';
const inputs = document.querySelectorAll('.pin-input input');
const lockScreen = document.getElementById('lock-screen');
const mainContent = document.getElementById('main-content');

// Check if already authed this session
if (sessionStorage.getItem('jet-auth') === 'true') {
  lockScreen.style.display = 'none';
  mainContent.style.display = 'block';
  loadStatus(); loadActivity(); loadQA();
}

inputs.forEach((input, i) => {
  input.addEventListener('input', (e) => {
    if (e.target.value.length === 1 && i < inputs.length - 1) {
      inputs[i + 1].focus();
    }
    if (i === inputs.length - 1 && e.target.value.length === 1) {
      const code = Array.from(inputs).map(inp => inp.value).join('');
      if (code === HASH) {
        sessionStorage.setItem('jet-auth', 'true');
        lockScreen.style.display = 'none';
        mainContent.style.display = 'block';
        loadStatus(); loadActivity(); loadQA();
      } else {
        document.getElementById('pin-error').textContent = 'Wrong code';
        inputs.forEach(inp => { inp.value = ''; inp.style.borderColor = '#ef4444'; });
        inputs[0].focus();
        setTimeout(() => {
          inputs.forEach(inp => inp.style.borderColor = '#333');
          document.getElementById('pin-error').textContent = '';
        }, 1500);
      }
    }
  });
  input.addEventListener('keydown', (e) => {
    if (e.key === 'Backspace' && !e.target.value && i > 0) {
      inputs[i - 1].focus();
    }
  });
});
</script>

<script>
async function loadQA() {
  try {
    const res = await fetch('./qa-log.json?' + Date.now());
    const data = await res.json();
    const sorted = data.sort((a, b) => new Date(b.ts) - new Date(a.ts));
    
    const pass = data.filter(d => d.status === 'pass').length;
    const fail = data.filter(d => d.status === 'fail').length;
    const flagged = data.filter(d => d.status === 'flagged').length;
    
    document.getElementById('qa-pass').textContent = pass;
    document.getElementById('qa-fail').textContent = fail;
    document.getElementById('qa-flagged').textContent = flagged;
    
    const el = document.getElementById('qa-reviews');
    if (sorted.length === 0) {
      el.innerHTML = '<div class="no-incidents">No QA reviews yet</div>';
      return;
    }
    el.innerHTML = sorted.map(item => {
      const d = new Date(item.ts);
      const time = d.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true, timeZone: 'America/New_York' });
      const botEmoji = botEmojis[item.bot] || '🤖';
      return `<div class="qa-item">
        <span class="activity-time">${time}</span>
        <span class="qa-badge ${item.status}">${item.status}</span>
        <span style="font-size:14px">${botEmoji}</span>
        <span class="activity-text">${item.action}${item.details ? '<br><span style="color:#666;font-size:12px">' + item.details + '</span>' : ''}</span>
      </div>`;
    }).join('');
  } catch (e) {
    document.getElementById('qa-reviews').innerHTML = '<div class="no-incidents">Unable to load QA data</div>';
  }
}

let allActivity = [];
let activeBot = 'all';

const botEmojis = { jet: '⚡', crm: '📇', macra: '💊', 'macra-app': '📱', printingpress: '🖨️', writer: '✍️', gemma: '🤓', grok: '🔍', health: '💪' };

async function loadActivity() {
  try {
    const res = await fetch('./activity-log.json?' + Date.now());
    allActivity = await res.json();
    allActivity.sort((a, b) => new Date(b.ts) - new Date(a.ts));
    renderActivity();
  } catch (e) {
    document.getElementById('activity').innerHTML = '<div class="no-incidents">Unable to load activity</div>';
  }
}

function renderActivity() {
  const filtered = activeBot === 'all' ? allActivity : allActivity.filter(item => item.bot === activeBot);
  const el = document.getElementById('activity');
  if (filtered.length === 0) {
    el.innerHTML = '<div class="no-incidents">No activity' + (activeBot !== 'all' ? ' for this bot' : '') + '</div>';
    return;
  }
  el.innerHTML = filtered.map(item => {
    const d = new Date(item.ts);
    const time = d.toLocaleString('en-US', { month: 'short', day: 'numeric', hour: 'numeric', minute: '2-digit', hour12: true, timeZone: 'America/New_York' });
    const cat = item.category || 'other';
    const botTag = activeBot === 'all' && item.bot ? `<span class="activity-cat cat-infra" style="font-size:9px">${botEmojis[item.bot] || ''} ${item.bot}</span>` : '';
    return `<div class="activity-item">
      <span class="activity-time">${time}</span>
      ${botTag}
      <span class="activity-cat cat-${cat}">${cat}</span>
      <span class="activity-text">${item.action}</span>
    </div>`;
  }).join('');
}

// Tab click handlers
document.getElementById('bot-tabs').addEventListener('click', (e) => {
  if (e.target.classList.contains('tab-btn')) {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    e.target.classList.add('active');
    activeBot = e.target.dataset.bot;
    renderActivity();
  }
});

async function loadStatus() {
  try {
    const res = await fetch('./status.json?' + Date.now());
    const data = await res.json();
    render(data);
  } catch (e) {
    document.getElementById('overall').className = 'overall-status unknown';
    document.querySelector('#overall .text').textContent = 'Unable to load status';
  }
}

function badge(status) {
  const labels = { operational: 'Operational', degraded: 'Degraded', down: 'Down', unknown: 'Unknown' };
  return `<span class="status-badge badge-${status}">${labels[status] || status}</span>`;
}

function render(data) {
  // Overall
  const el = document.getElementById('overall');
  el.className = `overall-status ${data.overall}`;
  const labels = { operational: 'All Systems Operational', degraded: 'Partial Degradation', down: 'Major Outage' };
  el.querySelector('.text').textContent = labels[data.overall] || data.overall;
  el.querySelector('.text').classList.remove('loading');

  // Infrastructure
  document.getElementById('infra').innerHTML = data.infrastructure.map(c =>
    `<div class="component"><span class="name"><span class="emoji">${c.emoji || ''}</span> ${c.name}</span>${badge(c.status)}</div>`
  ).join('');

  // Bots
  document.getElementById('bots').innerHTML = data.bots.map(c =>
    `<div class="component"><span class="name"><span class="emoji">${c.emoji || ''}</span> ${c.name}</span>${badge(c.status)}</div>`
  ).join('');

  // Integrations
  document.getElementById('integrations').innerHTML = data.integrations.map(c =>
    `<div class="component"><span class="name"><span class="emoji">${c.emoji || ''}</span> ${c.name}</span>${badge(c.status)}</div>`
  ).join('');

  // Incidents
  if (data.incidents && data.incidents.length > 0) {
    document.getElementById('incidents').innerHTML = data.incidents.map(i =>
      `<div class="incident">
        <div class="date">${i.date}</div>
        <div class="title">${i.title}</div>
        <div class="desc">${i.description}</div>
        ${i.resolved ? `<div class="resolved">✓ Resolved${i.resolvedAt ? ' — ' + i.resolvedAt : ''}</div>` : ''}
      </div>`
    ).join('');
  } else {
    document.getElementById('incidents').innerHTML = '<div class="no-incidents">No incidents in the last 30 days 🎉</div>';
  }

  // Footer
  document.getElementById('last-updated').textContent = `Last updated: ${data.updatedAt || 'Unknown'}`;
}

loadStatus();
loadActivity();
loadQA();
setInterval(loadStatus, 60000);
setInterval(loadActivity, 60000);
setInterval(loadQA, 60000);
</script>
</body>
</html>
